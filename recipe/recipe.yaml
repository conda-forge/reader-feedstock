schema_version: 1

context:
  python_min: "3.11"
  name: reader
  version: "3.23"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/reader-${{ version }}.tar.gz
  sha256: 4b32e02379eff6090c10b41fd6f98b93c4de64879f5ae89ab8072ad6bd813b22

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}
    - typing_extensions >=4
    - feedparser >=6
    - requests >=2.18
    - werkzeug >2
    - iso8601 >=1
    - beautifulsoup4 >=4.5

tests:
  - python:
      imports:
        - reader
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Python feed reader library.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/lemon24/reader
  documentation: https://reader.readthedocs.io/

extra:
  recipe-maintainers:
    - thewchan
